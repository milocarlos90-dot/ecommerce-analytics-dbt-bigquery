version: 2

models:
  - name: fct_sessions
    description: >
      Session-level behavioral fact table derived from event data.
      Represents one row per journey_session_id.
      Aggregates event-level timing, engagement, and conversion behavior
      into session-level metrics for analytics and reporting.

    config:
      contract:
        enforced: true

    columns:

      # --------------------------------------------------
      # Keys
      # --------------------------------------------------

      - name: journey_session_id
        description: Application-defined session identifier. Primary key of the model.
        data_type: string
        data_tests:
          - not_null
          - unique

      - name: customer_id
        description: Natural key identifying the customer associated with the session.
        data_type: int64

      - name: customer_sk
        description: Surrogate key referencing dim_customers.
        data_type: string
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_sk

      # --------------------------------------------------
      # Timing
      # --------------------------------------------------

      - name: session_start_ts
        description: Timestamp of the first event within the session.
        data_type: timestamp
        data_tests:
          - not_null

      - name: session_end_ts
        description: Timestamp of the last event within the session.
        data_type: timestamp
        data_tests:
          - not_null

      - name: session_date
        description: Calendar date derived from session_start_ts.
        data_type: date
        data_tests:
          - not_null

      - name: session_duration_seconds
        description: Total duration of the session in seconds.
        data_type: int64
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: session_duration_minutes
        description: Total duration of the session in minutes.
        data_type: int64

      - name: session_duration_hours
        description: Total duration of the session in hours.
        data_type: int64

      # --------------------------------------------------
      # Engagement Metrics
      # --------------------------------------------------

      - name: event_count
        description: Total number of events within the session.
        data_type: int64
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1

      - name: distinct_products_viewed
        description: Number of unique products viewed during the session.
        data_type: int64
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      # --------------------------------------------------
      # Behavioral Flags
      # --------------------------------------------------

      - name: has_conversion
        description: Binary flag indicating whether a conversion occurred in the session.
        data_type: int64
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

      - name: is_bounce
        description: Binary flag indicating if the session contains only one event.
        data_type: int64
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

      - name: session_type
        description: >
          Behavioral classification of the session based on engagement
          and conversion activity.
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - conversion
                  - research
                  - single_product
                  - browse

      - name: time_to_purchase_seconds
        description: >
          Number of seconds from session start to first conversion event.
          Null if no conversion occurred in the session.
        data_type: int64
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
              config:
                where: "time_to_purchase_seconds IS NOT NULL"
     
      # --------------------------------------------------
      # Acquisition Context
      # --------------------------------------------------

      - name: traffic_source
        description: Traffic source captured from the session entry event.
        data_type: string

      - name: browser
        description: Browser captured from the session entry event.
        data_type: string

      - name: has_home
        description: >
         Session-level flag indicating whether the session included at least one
         'home' event. Represents the first step in the funnel.
        data_type: int64
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

      - name: has_department
        description: >
         Session-level flag indicating whether the session included at least one
         'department' event. Represents the first step in the funnel.
        data_type: int64
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

      - name: has_product
        description: >
         Session-level flag indicating whether the session included at least one
         'product' event. Represents the first step in the funnel.
        data_type: int64
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1


      - name: has_cart
        description: >
         Session-level flag indicating whether the session included at least one
         'cart' event. Represents the first step in the funnel.
        data_type: int64
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

      - name: has_purchase
        description: >
         Session-level flag indicating whether the session included at least one
         'purchase' event. Represents the first step in the funnel.
        data_type: int64
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                        
      - name: product_view_count
        description: Total number of product page view events within the session.
        data_type: int64
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: cart_event_count
        description: Total number of add-to-cart events within the session.
        data_type: int64
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: purchase_event_count
        description: Total number of purchase events within the session.
        data_type: int64
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: first_event_type
        description: Event type of the first event recorded in the session.
        data_type: string
        data_tests:
          - not_null

      - name: last_event_type
        description: Event type of the final event recorded in the session.
        data_type: string
        data_tests:
          - not_null

      - name: max_session_sequence
        description: Maximum event sequence number observed in the session, representing navigation depth.
        data_type: int64
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1

      - name: is_no_product_engagement
        description: Binary flag indicating the session did not include product views, cart events, or purchases.
        data_type: int64
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

      - name: funnel_depth
        description: Numeric representation of the deepest funnel stage reached during the session.
        data_type: int64
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 5