version: 2

models:
  - name: dim_dates
    description: >
      Calendar date dimension generated using dbt_utils.date_spine.
      Provides standardized time attributes used across all fact tables
      for consistent temporal analysis.

    config:
      contract:
        enforced: true

    columns:

      # --------------------------------------------------
      # Primary Key
      # --------------------------------------------------

      - name: date_day
        description: "Calendar date at day grain."
        data_type: date
        data_tests:
          - not_null
          - unique

      # --------------------------------------------------
      # Calendar Attributes
      # --------------------------------------------------

      - name: year
        description: "Calendar year."
        data_type: int64

      - name: quarter
        description: "Calendar quarter number (1–4)."
        data_type: int64

      - name: month
        description: "Calendar month number (1–12)."
        data_type: int64

      - name: month_name
        description: "Full month name."
        data_type: string

      - name: day_of_month
        description: "Day of month (1–31)."
        data_type: int64

      - name: day_of_week
        description: "Day of week number."
        data_type: int64

      - name: day_name
        description: "Name of weekday."
        data_type: string

      - name: week_of_year
        description: "ISO week number within the year."
        data_type: int64

      # --------------------------------------------------
      # Boolean Flags
      # --------------------------------------------------

      - name: is_weekend
        description: "True if Saturday or Sunday."
        data_type: bool
        data_tests:
          - not_null

      - name: is_month_start
        description: "True if first day of month."
        data_type: bool
        data_tests:
          - not_null

      - name: is_month_end
        description: "True if last day of month."
        data_type: bool
        data_tests:
          - not_null

      - name: is_quarter_start
        description: "True if first day of quarter."
        data_type: bool
        data_tests:
          - not_null

      - name: is_quarter_end
        description: "True if last day of quarter."
        data_type: bool
        data_tests:
          - not_null

      - name: is_year_start
        description: "True if first day of year."
        data_type: bool
        data_tests:
          - not_null

      - name: is_year_end
        description: "True if last day of year."
        data_type: bool
        data_tests:
          - not_null

      # --------------------------------------------------
      # Reporting Helpers
      # --------------------------------------------------

      - name: year_month
        description: "Year-month formatted value (YYYY-MM)."
        data_type: string

      - name: week_start_date
        description: "Start date of ISO week."
        data_type: date

      - name: month_start_date
        description: "First day of the month."
        data_type: date