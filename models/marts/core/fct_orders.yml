version: 2

models:
  - name: fct_orders
    description: >
      Order-level fact table containing one record per order.
      Stores transactional measures and foreign keys linking
      to conformed dimensions.

    config:
      contract:
        enforced: true

    columns:

      # --------------------------------------------------
      # Primary Identifier
      # --------------------------------------------------

      - name: order_id
        description: "Business identifier for the order."
        data_type: int64
        data_tests:
          - not_null
          - unique

      # --------------------------------------------------
      # Dimension Keys
      # --------------------------------------------------

      - name: customer_sk
        description: "Foreign key referencing dim_customers."
        data_type: string
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_sk

      # --------------------------------------------------
      # Dates
      # --------------------------------------------------

      - name: order_created_at
        description: "Timestamp when the order was created."
        data_type: timestamp
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= CURRENT_TIMESTAMP()"

      - name: order_created_date
        description: "Date the order was created."
        data_type: date
        data_tests:
          - not_null

      # --------------------------------------------------
      # Order Status Flags
      # --------------------------------------------------

      - name: is_completed_order
        description: "Indicates if the order reached completed status."
        data_type: bool

      - name: is_cancelled_order
        description: "Indicates if the order was cancelled."
        data_type: bool

      - name: is_returned_order
        description: "Indicates if the order was returned."
        data_type: bool

      - name: is_shipped_order
        description: "Indicates if the order was shipped."
        data_type: bool

      - name: is_processing_order
        description: "Indicates if the order is currently processing."
        data_type: bool

      # --------------------------------------------------
      # Measures
      # --------------------------------------------------

      - name: item_count
        description: "Total number of items in the order."
        data_type: int64
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 500

      - name: distinct_products
        description: "Number of distinct products in the order."
        data_type: int64
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 100

      - name: gross_revenue
        description: "Total gross revenue for the order."
        data_type: numeric(31,2)
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0.01
                max_value: 100000

      - name: completed_revenue
        description: "Revenue from completed orders."
        data_type: numeric(31,2)

      - name: cancelled_revenue
        description: "Revenue from cancelled orders."
        data_type: numeric(31,2)

      - name: returned_revenue
        description: "Revenue from returned orders."
        data_type: numeric(31,2)

      - name: shipped_revenue
        description: "Revenue from shipped orders."
        data_type: numeric(31,2)

      - name: processing_revenue
        description: "Revenue from orders currently processing."
        data_type: numeric(31,2)

    # --------------------------------------------------
    # Model-Level Business Logic data_tests
    # --------------------------------------------------

    data_tests:

      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
             - order_id
             - order_created_at

      # completed orders must have revenue
      - dbt_utils.expression_is_true:
          arguments:
            expression: 
              "NOT is_completed_order
              OR completed_revenue > 0"
          

      # revenue cannot exceed gross revenue
      - dbt_utils.expression_is_true:
          arguments:
            expression: 
              "completed_revenue <= gross_revenue"
          

      # cancelled orders should not generate completed revenue
      - dbt_utils.expression_is_true:
          arguments:
            expression: 
              "NOT is_cancelled_order
              OR completed_revenue = 0"
          

      # only one terminal order state allowed
      - dbt_utils.expression_is_true:
          arguments:
            expression: "
              (
                CAST(is_completed_order AS INT64) +
                CAST(is_cancelled_order AS INT64) +
                CAST(is_returned_order AS INT64)
              ) <= 1"