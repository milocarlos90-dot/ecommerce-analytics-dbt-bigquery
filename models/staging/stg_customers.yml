version: 2

models:
  - name: stg_customers
    description: "Staging model for customers from thelook_ecommerce source."

    columns:

      - name: customer_id
        description: "Primary key for customers."
        data_tests:
          - not_null
          - unique

      - name: email
        description: "customer email address."
        data_tests:
          - not_null
          - unique
              
      - name: first_name
        description: "customer first name."
        data_tests:
          - not_null

      - name: last_name
        description: "customer last name."
        data_tests:
          - not_null

      - name: age
        description: "customer age in years."
        data_tests:
          - not_null

      - name: created_at
        description: "Timestamp when the customer was created."
        data_tests:
          - not_null

      - name: gender
        description: "customer gender."

      - name: country
        description: "customer country."

      - name: latitude
        description: "customer latitude."

      - name: longitude
        description: "customer longitude."

      - name: customer_geography
        description: "Geographic location of the customer as GEOGRAPHY type."
