version: 2

models:
  - name: stg_inventory_items
    description: >
      Staging model for inventory items from the thelook_ecommerce dataset.
      Performs type casting and light renaming for downstream marts.

    columns:
      - name: inventory_item_id
        description: Unique identifier for each inventory item.
        tests:
          - not_null
          - unique

      - name: product_id
        description: Identifier of the related product.
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id

      - name: created_at
        description: Timestamp when the inventory item was created.

      - name: sold_at
        description: Timestamp when the item was sold.

      - name: cost
        description: Cost of the inventory item.

      - name: product_category
        description: Category of the product.

      - name: product_name
        description: Name of the product.

      - name: product_brand
        description: Brand of the product.

      - name: product_retail_price
        description: Retail price of the product.

      - name: product_department
        description: Department the product belongs to.

      - name: product_sku
        description: Stock keeping unit identifier.

      - name: product_distribution_center_id
        description: Distribution center responsible for the item.
